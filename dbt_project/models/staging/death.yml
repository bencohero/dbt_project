version: 2

models:
  - name: stg_death
    description: "Modèle de staging pour les données de décès"
    columns:
      - name: death_uuid
        data_tests:
          - not_null
          - unique
      - name: individual_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_individual')
                field: individual_uuid

unit_tests:
  - name: test_death_age_must_be_positive
    model: stg_death
    
    given:
      - input: source('dss', 'death')
        rows:
          # ageatdeath est stocké en jours dans la source brute (ex: 150 jours, 730 jours)
          - { uuid: 'D1', individual_uuid: '1', ageatdeath: '150', deathcause: 'Palu', deathdate: '2026-06-01', deathplace: '1', insertdate: '2026-06-02' }
          - { uuid: 'D2', individual_uuid: '2', ageatdeath: '730', deathcause: 'Autre', deathdate: '2026-06-01', deathplace: '3', insertdate: '2026-06-02' }

    expect:
      rows:
        # On valide les résultats par rapport à vos divisions par 365 et vos classes d'âge
        - { death_uuid: 'D1', individual_id: '1', ageatdeath: 0, age_class: '<1', deathplace: 'formation sanitaire' }
        - { death_uuid: 'D2', individual_id: '2', ageatdeath: 2, age_class: '1-4', deathplace: 'domicile' }
        