version: 2

sources:
  - name: dss # Nom logique que vous donnerez à votre source dans dbt
    schema: bronze         # Le vrai nom du schéma dans votre base PostgreSQL (ex: public, raw, etc.)
    description: "Données brutes existantes dans la base PostgreSQL"
    
    tables:
      - name: individual  # Le nom exact de votre première table Postgres
        description: "Table contenant les informations des individus"
        tests:
          - unique:
              column_name: extId # dbt vérifiera automatiquement s'il y a des doublons
          - not_null:
              column_name: extId

      - name: death     
        description: "Table contenant les informations de décès"
        columns:
          - name: status
            description: "Statut de la commande (completed, pending, cancelled)"
      
      - name: inmigration
        description: "Table contenant les information d'immigration"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
      
      - name: outmigration
        description: "Table contenant les information d'émigration"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid

      - name: location
        description: "Table contenant les information de localisation"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
          - not_null:
              column_name: extId
          - unique:
              column_name: extId
      
      - name: locationhierarchy
        description: "Table contenant les information de hiérarchie de localisation"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid

      - name: pregnancyobservation
        description: "Table contenant les information d'observation de grossesse"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
      
      - name: pregnancyoutcome
        description: "Table contenant les information d'issue de grossesse"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
      
      - name: residency
        description: "Table contenant les informations de residence"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid

      - name: membership
        description: "Table contenant les informations d'appartenance"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
      
      - name: socialgroup
        description: "Table contenant les informations de groupe social"
        tests:
          - unique:
              column_name: uuid
          - not_null:
              column_name: uuid
          - not_null:
              column_name: extId
          - unique:
              column_name: extId